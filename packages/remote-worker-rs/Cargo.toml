[package]
name = "remote-worker-rs"
version = "2.0.0"
edition = "2021"

[[bin]]
name = "remote-worker-rs"
path = "src/main.rs"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[dependencies]
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "fs", "time", "sync", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures-util = "0.3"
